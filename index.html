<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening O2SN 2026 - Lubuklinggau Selatan I</title>
    <style>
        :root {
            --glow-color: #007bff; /* Biru Royal */
            --bg-top: #ffffff;    /* Putih */
            --bg-bottom: #e6f2ff; /* Biru Sangat Muda */
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: #333;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #status-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            font-weight: 800;
            color: #004085;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .palm-container {
            position: relative;
            width: 300px;
            height: 400px;
            border: 4px solid #007bff;
            border-radius: 40px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 123, 255, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        #countdown-text {
            position: absolute;
            font-size: 8rem;
            font-weight: 900;
            color: #007bff;
            text-shadow: 0 0 20px rgba(0, 123, 255, 0.3);
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        .palm-icon {
            width: 220px;
            height: 220px;
            fill: #007bff;
            opacity: 0.2;
            transition: all 0.5s ease;
        }

        .palm-container.active {
            transform: scale(0.98);
            background: #ffffff;
            box-shadow: 0 0 50px rgba(0, 123, 255, 0.4);
        }

        .palm-container.active .palm-icon {
            opacity: 0.1;
            filter: blur(4px);
        }

        .scanner-line {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 6px;
            background: #007bff;
            box-shadow: 0 0 15px #007bff;
            display: none;
            z-index: 5;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
            text-align: center;
            padding-top: 50px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .success-overlay h1 { font-size: 5rem; margin: 10px 0; color: #004085; }
        .success-overlay h2 { color: #007bff; letter-spacing: 5px; }

        .btn-reset {
            margin-top: 30px;
            padding: 12px 25px;
            background: #007bff;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }
    </style>
</head>
<body>

    <div id="status-text">SYSTEM READY<br><span style="font-size: 0.9rem; opacity: 0.7;">TEMPELKAN TELAPAK TANGAN</span></div>

    <div class="palm-container" id="palmTrigger">
        <div id="countdown-text">3</div>
        <svg class="palm-icon" viewBox="0 0 24 24">
            <path d="M12,25c-2.4,0-4.6-0.9-6.3-2.6c-2.3-2.3-3.1-5.6-2.1-8.7l1-3.1c0.2-0.7,0.8-1.2,1.5-1.4l0.1,0c0.8-0.2,1.7,0.3,1.9,1.1l0.6,2.1V5.5C8.7,4.7,9.4,4,10.2,4s1.5,0.7,1.5,1.5v5.1h0.5V2.5C12.2,1.7,12.9,1,13.7,1s1.5,0.7,1.5,1.5v7.6h0.5V3.5c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5v7.6h0.5v-3c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5V16c0,3.3-1.9,6.2-4.8,7.6C15.9,24.4,14,25,12,25z"/>
        </svg>
        <div class="scanner-line" id="scanner"></div>
    </div>

    <div class="success-overlay" id="successScreen">
        <div style="margin-top: 10vh;">
            <h3 style="color: #666;">DENGAN RAHMAT TUHAN YME</h3>
            <h1 style="font-weight: 900;">O2SN 2026</h1>
            <h2>LUBUKLINGGAU SELATAN I</h2>
            <h1 style="color: #ffd700; font-size: 4.5rem; text-shadow: 3px 3px 0 #004085;">RESMI DIBUKA</h1>
            <p style="font-size: 1.5rem; margin-top: 40px; color: #555; font-weight: 500;">"Sportivitas Adalah Jati Diri Kami"</p>
            <button class="btn-reset" onclick="location.reload()">RESTART SYSTEM</button>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('palmTrigger');
        const scanner = document.getElementById('scanner');
        const successScreen = document.getElementById('successScreen');
        const statusText = document.getElementById('status-text');
        const countdownDisplay = document.getElementById('countdown-text');
        
        let scanInterval;
        let countdownValue = 3;
        let audioCtx;
        let oscillator;

        // Fungsi menciptakan suara sirine (Tsunami Style)
        function playSiren() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'triangle'; 
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            
            // Efek naik turun frekuensi (Sirine)
            oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 1);
            oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 2);
            oscillator.loop = true;

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        function stopSiren() {
            if (oscillator) {
                oscillator.stop();
                oscillator.disconnect();
            }
        }

        function startScan(e) {
            e.preventDefault();
            countdownValue = 3;
            countdownDisplay.innerText = countdownValue;
            countdownDisplay.style.display = 'block';
            
            trigger.classList.add('active');
            scanner.style.display = 'block';
            scanner.style.animation = 'scanMove 1.5s infinite alternate linear';
            statusText.innerHTML = 'VERIFYING BIOMETRICS...<br><span style="color: #007bff;">EMERGENCY PROTOCOL ACTIVE</span>';
            
            playSiren(); // Mulai Sirine

            scanInterval = setInterval(() => {
                countdownValue--;
                if (countdownValue > 0) {
                    countdownDisplay.innerText = countdownValue;
                    if (navigator.vibrate) navigator.vibrate(100);
                } else {
                    clearInterval(scanInterval);
                    showSuccess();
                }
            }, 1000);
        }

        function cancelScan() {
            clearInterval(scanInterval);
            stopSiren(); // Berhenti Sirine
            countdownDisplay.style.display = 'none';
            trigger.classList.remove('active');
            scanner.style.display = 'none';
            scanner.style.animation = 'none';
            statusText.innerHTML = 'SYSTEM READY<br><span style="font-size: 0.9rem; opacity: 0.7;">TEMPELKAN TELAPAK TANGAN</span>';
        }

        function showSuccess() {
            stopSiren();
            countdownDisplay.style.display = 'none';
            successScreen.style.display = 'block';
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
        }

        trigger.addEventListener('mousedown', startScan);
        trigger.addEventListener('touchstart', startScan);
        window.addEventListener('mouseup', cancelScan);
        window.addEventListener('touchend', cancelScan);
    </script>
</body>
</html>
