<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening O2SN 2026 - Lubuklinggau Selatan I</title>
    <style>
        :root {
            --glow-color: #0077ff; /* Biru lebih tajam untuk tema putih */
            --bg-gradient: linear-gradient(135deg, #f0f8ff 0%, #00aaff 100%);
        }

        body {
            margin: 0;
            background: var(--bg-gradient);
            color: #1a1a1a; /* Teks gelap agar kontras dengan putih */
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #status-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .palm-container {
            position: relative;
            width: 300px;
            height: 400px;
            border: 3px solid rgba(0, 119, 255, 0.4);
            border-radius: 30px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s;
        }

        #countdown-text {
            position: absolute;
            font-size: 8rem;
            font-weight: 900;
            color: var(--glow-color);
            text-shadow: 0 0 20px rgba(0, 119, 255, 0.5);
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        .palm-icon {
            width: 220px;
            height: 220px;
            fill: var(--glow-color);
            opacity: 0.5;
            transition: all 0.5s ease;
        }

        .palm-container.active {
            border-color: var(--glow-color);
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.6);
        }

        .palm-container.active .palm-icon {
            opacity: 0.1;
            filter: blur(4px);
        }

        .scanner-line {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--glow-color);
            box-shadow: 0 0 15px var(--glow-color);
            display: none;
            z-index: 5;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* Overlay Sukses Putih-Biru */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            z-index: 100;
            text-align: center;
            padding-top: 50px;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .success-overlay h1 { font-size: 5rem; margin: 10px 0; color: #0044cc; }
        .success-overlay h2 { color: #0077ff; letter-spacing: 5px; }

        .btn-reset {
            margin-top: 30px;
            padding: 12px 25px;
            background: #0077ff;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 119, 255, 0.3);
        }
    </style>
</head>
<body>

    <div id="status-text">SYSTEM READY<br><span style="font-size: 0.9rem; opacity: 0.7;">TEMPELKAN TELAPAK TANGAN</span></div>

    <div class="palm-container" id="palmTrigger">
        <div id="countdown-text">3</div>

        </svg>
        <div class="scanner-line" id="scanner"></div>
    </div>

    <div class="success-overlay" id="successScreen">
        <div style="margin-top: 10vh;">
            <h3 style="color: #555;">DENGAN RAHMAT TUHAN YME</h3>
            <h1 style="text-shadow: 0 4px 10px rgba(0,0,0,0.1);">O2SN 2026</h1>
            <h2>LUBUKLINGGAU SELATAN I</h2>
            <h1 style="color: #ffaa00; font-size: 4.5rem; text-shadow: 0 4px 15px rgba(255, 170, 0, 0.3);">RESMI DIBUKA</h1>
            <p style="font-size: 1.5rem; margin-top: 40px; font-style: italic; color: #444;">"Sportivitas Adalah Jati Diri Kami"</p>
            <button class="btn-reset" onclick="location.reload()">Reset System</button>
        </div>
    </div>

    <script>

        const scanner = document.getElementById('scanner');
        const successScreen = document.getElementById('successScreen');
        const statusText = document.getElementById('status-text');
        const countdownDisplay = document.getElementById('countdown-text');
