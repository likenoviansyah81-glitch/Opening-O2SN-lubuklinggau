<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening O2SN 2026 - Hand Scanner</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Container Video Latar Belakang (Muncul saat scan) */
        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s;
            pointer-events: none;
        }

        #status-text {
            font-size: 1.4rem;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            z-index: 10;
            text-shadow: 0 0 10px #00fbff;
        }

        .scanner-frame {
            position: relative;
            width: 320px;
            height: 450px;
            border: 2px solid rgba(0, 251, 255, 0.3);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 26, 51, 0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }

        .scanner-frame:active {
            border-color: #00fbff;
            box-shadow: 0 0 30px rgba(0, 251, 255, 0.4);
        }

        .palm-icon {
            width: 250px;
            fill: #00fbff;
            opacity: 0.2;
            transition: 0.5s;
        }

        .active .palm-icon {
            opacity: 0.8;
            filter: drop-shadow(0 0 15px #00fbff);
        }

        .laser {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #00fbff;
            box-shadow: 0 0 20px #00fbff, 0 0 40px #00fbff;
            display: none;
            z-index: 11;
        }

        @keyframes scanMove {
            0% { top: 10%; }
            100% { top: 90%; }
        }

        /* Layar Sukses */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #001a33 0%, #000 100%);
            z-index: 100;
            text-align: center;
            padding-top: 80px;
        }

        .success-overlay h1 { font-size: 4.5rem; color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.6); }
    </style>
</head>
<body>

    <div id="video-bg"></div>

    <div id="status-text">HOLD TO AUTHORIZE<br><span style="font-size: 0.8rem; opacity: 0.6;">SISTEM KEAMANAN O2SN 2026</span></div>

    <div class="scanner-frame" id="palmTrigger">
        <svg class="palm-icon" viewBox="0 0 24 24">
            <path d="M12,25c-2.4,0-4.6-0.9-6.3-2.6c-2.3-2.3-3.1-5.6-2.1-8.7l1-3.1c0.2-0.7,0.8-1.2,1.5-1.4l0.1,0c0.8-0.2,1.7,0.3,1.9,1.1l0.6,2.1V5.5C8.7,4.7,9.4,4,10.2,4s1.5,0.7,1.5,1.5v5.1h0.5V2.5C12.2,1.7,12.9,1,13.7,1s1.5,0.7,1.5,1.5v7.6h0.5V3.5c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5v7.6h0.5v-3c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5V16c0,3.3-1.9,6.2-4.8,7.6C15.9,24.4,14,25,12,25z"/>
        </svg>
        <div class="laser" id="laserLine"></div>
    </div>

    <div class="success-overlay" id="successScreen">
        <h3 style="letter-spacing: 5px;">ACCESS GRANTED</h3>
        <h2 style="margin:0;">O2SN 2026</h2>
        <h1>RESMI DIBUKA</h1>
        <p>"Sportivitas Adalah Jati Diri Kami"</p>
    </div>

    <script>
        const trigger = document.getElementById('palmTrigger');
        const laser = document.getElementById('laserLine');
        const status = document.getElementById('status-text');
        const videoBg = document.getElementById('video-bg');
        const success = document.getElementById('successScreen');
        
        let scanTimer;
        let audioCtx;

        // Inisialisasi Audio Context
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // Fungsi membuat suara bip/elektrik
        function playScanSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2.5);
        }

        function startScan(e) {
            e.preventDefault();
            initAudio();
            playScanSound();

            trigger.classList.add('active');
            laser.style.display = 'block';
            laser.style.animation = 'scanMove 2s infinite linear';
            
            // Tampilkan Video Latar (Mute agar tidak bentrok)
            videoBg.style.opacity = '0.4';
            videoBg.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/bRNlrdfKNd4?autoplay=1&mute=1&controls=0&loop=1&playlist=bRNlrdfKNd4" frameborder="0" allow="autoplay"></iframe>`;

            status.innerHTML = '<span style="color: #00fbff;">AUTHENTICATING...</span>';
            
            scanTimer = setTimeout(finishScan, 4000); // 4 detik proses scan
        }

        function cancelScan() {
            clearTimeout(scanTimer);
            trigger.classList.remove('active');
            laser.style.display = 'none';
            videoBg.style.opacity = '0';
            videoBg.innerHTML = '';
            status.innerHTML = 'HOLD TO AUTHORIZE<br><span style="font-size: 0.8rem; opacity: 0.6;">SISTEM KEAMANAN O2SN 2026</span>';
        }

        function finishScan() {
            success.style.display = 'block';
            // Mainkan video pembukaan utama dengan suara
            const finalVideoId = 'dZYC1Dk8O88'; 
            success.innerHTML += `<iframe width="0" height="0" src="https://www.youtube.com/embed/${finalVideoId}?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }

        trigger.addEventListener('mousedown', startScan);
        trigger.addEventListener('touchstart', startScan);
        window.addEventListener('mouseup', cancelScan);
        window.addEventListener('touchend', cancelScan);
    </script>
</body>
</html>
