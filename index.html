<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening O2SN 2026 - Lubuklinggau Selatan I</title>
    <style>
        body {
            margin: 0;
            background: #000b1a;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #status-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 251, 255, 0.5);
            transition: all 0.3s;
        }

        /* Container Scanner */
        .palm-container {
            position: relative;
            width: 300px;
            height: 400px;
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            cursor: pointer;
            background: rgba(0, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Ikon Telapak Tangan */
        .palm-icon {
            width: 220px;
            height: 220px;
            fill: #00fbff;
            opacity: 0.3;
            transition: all 0.5s ease;
        }

        /* Efek saat ditekan */
        .palm-container.active .palm-icon {
            opacity: 0.8;
            filter: drop-shadow(0 0 15px #00fbff);
            transform: scale(1.05);
        }

        /* Garis Laser Scanner */
        .scanner-line {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #00fbff, transparent);
            box-shadow: 0 0 15px #00fbff, 0 0 30px #00fbff;
            display: none;
            z-index: 5;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* Overlay Berhasil */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #001a33 0%, #000 100%);
            z-index: 100;
            text-align: center;
            padding-top: 50px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-overlay h1 { font-size: 5rem; margin: 5px 0; font-weight: 900; }
        .success-overlay h2 { font-size: 2rem; color: #00fbff; letter-spacing: 5px; }
        .success-overlay h3 { font-size: 1.8rem; color: #ffd700; }

        .confetti-box {
            animation: zoomIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="status-text">BIOMETRIC AUTHENTICATION<br><span style="font-size: 0.9rem; opacity: 0.7;">SILAKAN TEMPELKAN TELAPAK TANGAN</span></div>

    <div class="palm-container" id="palmTrigger">
        <svg class="palm-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12,25L12,25c-2.4,0-4.6-0.9-6.3-2.6c-2.3-2.3-3.1-5.6-2.1-8.7l1-3.1c0.2-0.7,0.8-1.2,1.5-1.4l0.1,0c0.8-0.2,1.7,0.3,1.9,1.1l0.6,2.1V5.5C8.7,4.7,9.4,4,10.2,4s1.5,0.7,1.5,1.5v5.1h0.5V2.5C12.2,1.7,12.9,1,13.7,1s1.5,0.7,1.5,1.5v7.6h0.5V3.5c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5v7.6h0.5v-3c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5V16c0,3.3-1.9,6.2-4.8,7.6C15.9,24.4,14,25,12,25z"/>
        </svg>
        <div class="scanner-line" id="scanner"></div>
    </div>

    <div id="musicPlayer" style="display:none"></div>

    <div class="success-overlay" id="successScreen">
        <div class="confetti-box">
            <h3>DENGAN RAHMAT TUHAN YME</h3>
            <h2 style="color: white; margin-bottom: 0;">OPENING CEREMONY</h2>
            <h1>O2SN 2026</h1>
            <h2 style="margin-top: 0;">LUBUKLINGGAU SELATAN I</h2>
            <h1 style="color: #ffd700; font-size: 4.5rem; text-shadow: 0 0 20px rgba(255,215,0,0.5);">RESMI DIBUKA</h1>
            <p style="font-size: 1.5rem; margin-top: 40px; font-style: italic; color: #a0f9ff;">"Sportivitas Adalah Jati Diri Kami"</p>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('palmTrigger');
        const scanner = document.getElementById('scanner');
        const successScreen = document.getElementById('successScreen');
        const statusText = document.getElementById('status-text');
        
        let scanTimer;

        function startScan(e) {
            e.preventDefault();
            trigger.classList.add('active');
            scanner.style.display = 'block';
            scanner.style.animation = 'scanMove 1.5s infinite alternate linear';
            
            statusText.innerHTML = 'SCANNING FINGERPRINT...<br><span style="color: #00fbff; font-size: 0.9rem;">IDENTITAS TERVERIFIKASI 85%</span>';
            statusText.style.color = '#00fbff';
            
            // Proses scan selama 3 detik
            scanTimer = setTimeout(showSuccess, 3000);
        }

        function cancelScan() {
            clearTimeout(scanTimer);
            trigger.classList.remove('active');
            scanner.style.display = 'none';
            scanner.style.animation = 'none';
            statusText.innerHTML = 'BIOMETRIC AUTHENTICATION<br><span style="font-size: 0.9rem; opacity: 0.7;">SILAKAN TEMPELKAN TELAPAK TANGAN</span>';
            statusText.style.color = 'white';
        }

        function showSuccess() {
            successScreen.style.display = 'block';
            
            // Memutar Lagu (YouTube Embed Autoplay)
            const videoId = 'dZYC1Dk8O88';
            const player = document.getElementById('musicPlayer');
            player.innerHTML = `<iframe width="0" height="0" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            
            // Trigger haptic feedback jika tersedia di HP
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 200]);
            }
        }

        // Event Listeners untuk PC dan Mobile
        trigger.addEventListener('mousedown', startScan);
        trigger.addEventListener('touchstart', startScan);
        
        window.addEventListener('mouseup', cancelScan);
        window.addEventListener('touchend', cancelScan);
    </script>
</body>
</html>
