<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening O2SN 2026 - Lubuklinggau Selatan I</title>
    <style>
        :root {
            --glow-color: #00fbff;
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Background Image dengan Overlay Gelap */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Ganti link di bawah ini dengan Direct Link foto kamu nantinya */
            background: linear-gradient(rgba(0, 8, 15, 0.8), rgba(0, 8, 15, 0.8)), 
                        url('https://images.unsplash.com/photo-1504333638930-c8787321eee0?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        #status-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 251, 255, 0.4);
        }

        .palm-container {
            position: relative;
            width: 300px;
            height: 400px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            background: rgba(0, 20, 40, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0, 251, 255, 0.1);
            overflow: hidden;
            transition: border-color 0.3s;
        }

        #countdown-text {
            position: absolute;
            font-size: 8rem;
            font-weight: 900;
            color: var(--glow-color);
            text-shadow: 0 0 30px var(--glow-color);
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        .palm-icon {
            width: 220px;
            height: 220px;
            fill: var(--glow-color);
            opacity: 0.3;
            transition: all 0.5s ease;
        }

        .palm-container.active .palm-icon {
            opacity: 0.1;
            filter: blur(4px);
            transform: scale(1.05);
        }

        .scanner-line {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--glow-color);
            box-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color);
            display: none;
            z-index: 5;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            text-align: center;
            padding-top: 50px;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-overlay h1 { font-size: 5rem; margin: 10px 0; }
        .success-overlay h2 { color: var(--glow-color); letter-spacing: 5px; }

        .btn-reset {
            margin-top: 30px;
            padding: 12px 24px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="status-text">SYSTEM READY<br><span style="font-size: 0.9rem; opacity: 0.6;">TEMPELKAN TELAPAK TANGAN</span></div>

    <div class="palm-container" id="palmTrigger">
        <div id="countdown-text">3</div>
        <svg class="palm-icon" viewBox="0 0 24 24">
            <path d="M12,25c-2.4,0-4.6-0.9-6.3-2.6c-2.3-2.3-3.1-5.6-2.1-8.7l1-3.1c0.2-0.7,0.8-1.2,1.5-1.4l0.1,0c0.8-0.2,1.7,0.3,1.9,1.1l0.6,2.1V5.5C8.7,4.7,9.4,4,10.2,4s1.5,0.7,1.5,1.5v5.1h0.5V2.5C12.2,1.7,12.9,1,13.7,1s1.5,0.7,1.5,1.5v7.6h0.5V3.5c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5v7.6h0.5v-3c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5V16c0,3.3-1.9,6.2-4.8,7.6C15.9,24.4,14,25,12,25z"/>
        </svg>
        <div class="scanner-line" id="scanner"></div>
    </div>

    <div class="success-overlay" id="successScreen">
        <div style="margin-top: 10vh;">
            <h3 style="color: #ccc;">DENGAN RAHMAT TUHAN YME</h3>
            <h1>O2SN 2026</h1>
            <h2>LUBUKLINGGAU SELATAN I</h2>
            <h1 style="color: #ffd700; font-size: 4.5rem; text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);">RESMI DIBUKA</h1>
            <p style="font-size: 1.5rem; margin-top: 40px; font-style: italic; opacity: 0.8;">"Sportivitas Adalah Jati Diri Kami"</p>
            <button class="btn-reset" onclick="location.reload()">Reset System</button>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('palmTrigger');
        const scanner = document.getElementById('scanner');
        const successScreen = document.getElementById('successScreen');
        const statusText = document.getElementById('status-text');
        const countdownDisplay = document.getElementById('countdown-text');
        
        let scanInterval;
        let countdownValue = 3;
        let audioCtx;

        function playSiren() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            oscillator.frequency.setValueAtTime(300, now);
            oscillator.frequency.exponentialRampToValueAtTime(800, now + 1.5);
            oscillator.frequency.exponentialRampToValueAtTime(300, now + 3);
            oscillator.frequency.exponentialRampToValueAtTime(800, now + 4.5);
            oscillator.frequency.exponentialRampToValueAtTime(100, now + 6);
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.5, now + 0.5);
            gainNode.gain.linearRampToValueAtTime(0, now + 6);
            oscillator.start();
            oscillator.stop(now + 6);
        }

        function startScan(e) {
            e.preventDefault();
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            countdownValue = 3;
            countdownDisplay.innerText = countdownValue;
            countdownDisplay.style.display = 'block';
            trigger.classList.add('active');
            scanner.style.display = 'block';
            scanner.style.animation = 'scanMove 1.5s infinite alternate linear';
            statusText.innerHTML = 'VERIFYING BIOMETRICS...<br><span style="color: #00fbff;">AUTHENTICATING</span>';
            scanInterval = setInterval(() => {
                countdownValue--;
                if (countdownValue > 0) {
                    countdownDisplay.innerText = countdownValue;
                    if (navigator.vibrate) navigator.vibrate(50);
                } else {
                    clearInterval(scanInterval);
                    showSuccess();
                }
            }, 1000);
        }

        function cancelScan() {
            clearInterval(scanInterval);
            countdownDisplay.style.display = 'none';
            trigger.classList.remove('active');
            scanner.style.display = 'none';
            scanner.style.animation = 'none';
            statusText.innerHTML = 'SYSTEM READY<br><span style="font-size: 0.9rem; opacity: 0.6;">TEMPELKAN TELAPAK TANGAN</span>';
        }

        function showSuccess() {
            countdownDisplay.style.display = 'none';
            successScreen.style.display = 'block';
            playSiren();
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 1000]);
            }
        }

        trigger.addEventListener('mousedown', startScan);
        trigger.addEventListener('touchstart', startScan);
        window.addEventListener('mouseup', cancelScan);
        window.addEventListener('touchend', cancelScan);
    </script>
</body>
</html>
