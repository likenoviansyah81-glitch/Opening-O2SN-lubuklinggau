<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening O2SN 2026 - Lubuklinggau Selatan I</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Video Background Container */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 Aspect Ratio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #status-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .palm-container {
            position: relative;
            width: 300px;
            height: 400px;
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 30px;
            cursor: pointer;
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 251, 255, 0.2);
            overflow: hidden;
        }

        .palm-icon {
            width: 220px;
            height: 220px;
            fill: #00fbff;
            opacity: 0.4;
            transition: all 0.5s ease;
        }

        .palm-container.active .palm-icon {
            opacity: 0.9;
            filter: drop-shadow(0 0 20px #00fbff);
            transform: scale(1.05);
        }

        .scanner-line {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 5px;
            background: #00fbff;
            box-shadow: 0 0 20px #00fbff;
            display: none;
            z-index: 5;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #001a33 0%, #000 100%);
            z-index: 100;
            text-align: center;
            padding-top: 50px;
        }

        .success-overlay h1 { font-size: 5rem; margin: 10px 0; }
        .success-overlay h2 { color: #00fbff; letter-spacing: 5px; }

        #musicPlayer { display: none; }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/bRNlrdfKNd4?autoplay=1&mute=1&controls=0&loop=1&playlist=bRNlrdfKNd4&rel=0&showinfo=0" 
                frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div id="status-text">SYSTEM READY<br><span style="font-size: 0.9rem; opacity: 0.8;">TEMPELKAN TELAPAK TANGAN</span></div>

    <div class="palm-container" id="palmTrigger">
        <svg class="palm-icon" viewBox="0 0 24 24">
            <path d="M12,25c-2.4,0-4.6-0.9-6.3-2.6c-2.3-2.3-3.1-5.6-2.1-8.7l1-3.1c0.2-0.7,0.8-1.2,1.5-1.4l0.1,0c0.8-0.2,1.7,0.3,1.9,1.1l0.6,2.1V5.5C8.7,4.7,9.4,4,10.2,4s1.5,0.7,1.5,1.5v5.1h0.5V2.5C12.2,1.7,12.9,1,13.7,1s1.5,0.7,1.5,1.5v7.6h0.5V3.5c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5v7.6h0.5v-3c0-0.8,0.7-1.5,1.5-1.5s1.5,0.7,1.5,1.5V16c0,3.3-1.9,6.2-4.8,7.6C15.9,24.4,14,25,12,25z"/>
        </svg>
        <div class="scanner-line" id="scanner"></div>
    </div>

    <div id="musicPlayer"></div>

    <div class="success-overlay" id="successScreen">
        <div style="margin-top: 10vh;">
            <h3>DENGAN RAHMAT TUHAN YME</h3>
            <h1>O2SN 2026</h1>
            <h2>LUBUKLINGGAU SELATAN I</h2>
            <h1 style="color: #ffd700; font-size: 4.5rem;">RESMI DIBUKA</h1>
            <p style="font-size: 1.5rem; margin-top: 40px;">"Sportivitas Adalah Jati Diri Kami"</p>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('palmTrigger');
        const scanner = document.getElementById('scanner');
        const successScreen = document.getElementById('successScreen');
        const statusText = document.getElementById('status-text');
        
        let scanTimer;

        function startScan(e) {
            e.preventDefault();
            trigger.classList.add('active');
            scanner.style.display = 'block';
            scanner.style.animation = 'scanMove 1.5s infinite alternate linear';
            statusText.innerHTML = 'VERIFYING BIOMETRICS...<br><span style="color: #00fbff;">ACCESSING DATABASE</span>';
            
            // Waktu scan 3 detik
            scanTimer = setTimeout(showSuccess, 3000);
        }

        function cancelScan() {
            clearTimeout(scanTimer);
            trigger.classList.remove('active');
            scanner.style.display = 'none';
            scanner.style.animation = 'none';
            statusText.innerHTML = 'SYSTEM READY<br><span style="font-size: 0.9rem; opacity: 0.8;">TEMPELKAN TELAPAK TANGAN</span>';
        }

        function showSuccess() {
            successScreen.style.display = 'block';
            
            // Audio Tararara (Trumpet)
            const videoId = 'dZYC1Dk8O88';
            const player = document.getElementById('musicPlayer');
            player.innerHTML = `<iframe width="0" height="0" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 200]);
        }

        trigger.addEventListener('mousedown', startScan);
        trigger.addEventListener('touchstart', startScan);
        window.addEventListener('mouseup', cancelScan);
        window.addEventListener('touchend', cancelScan);
    </script>
</body>
</html>
